name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brain_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/brain_os_test
      GROQ_API_KEY: ci-placeholder
      GITHUB_TOKEN: ci-placeholder
      GITHUB_REPO: test/repo
      LLM_PROVIDER: groq
      PREPR_VALIDATION: "off"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: python -m ruff check app/ --select E,F,W --ignore E501,E402

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
